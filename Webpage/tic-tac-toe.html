<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #0d1b2a;
      color: #e0e7ff;
    }
    .container {
      width: min(360px, 90vw);
      text-align: center;
      padding: 24px;
      border-radius: 24px;
      background: rgba(18, 52, 86, 0.94);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 16px;
      font-size: 1.9rem;
    }
    .status {
      margin-bottom: 18px;
      font-size: 1rem;
      color: #a8d0ff;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .cell {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: #0f172a;
      background: linear-gradient(180deg, #e0e7ff 0%, #c7d2fe 100%);
      border-radius: 18px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .cell:hover { transform: translateY(-2px); filter: brightness(1.03); }
    .cell.taken { cursor: default; }
    .controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      background: #5b7be3;
      color: white;
      transition: background 0.2s ease;
    }
    button:hover { background: #3f62d1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Current turn: X</div>
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>
    <div class="controls">
      <button id="resetBtn">Reset Game</button>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const boardEl = document.getElementById('board');
    const resetBtn = document.getElementById('resetBtn');
    const cells = Array.from(document.querySelectorAll('.cell'));

    let boardState = Array(9).fill('');
    let currentPlayer = 'X';
    let gameActive = true;

    const winningPatterns = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];

    function updateStatus(message) {
      statusEl.textContent = message;
    }

    function handleCellClick(event) {
      const cell = event.target;
      const index = Number(cell.dataset.index);

      if (!gameActive || boardState[index]) return;

      boardState[index] = currentPlayer;
      cell.textContent = currentPlayer;
      cell.classList.add('taken');

      if (checkWinner()) {
        updateStatus(`Player ${currentPlayer} wins!`);
        gameActive = false;
        return;
      }

      if (!boardState.includes('')) {
        updateStatus('Draw! Try again.');
        gameActive = false;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus(`Current turn: ${currentPlayer}`);
    }

    function checkWinner() {
      return winningPatterns.some(pattern => {
        const [a,b,c] = pattern;
        return boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c];
      });
    }

    function resetGame() {
      boardState = Array(9).fill('');
      currentPlayer = 'X';
      gameActive = true;
      cells.forEach(cell => {
        cell.textContent = '';
        cell.classList.remove('taken');
      });
      updateStatus('Current turn: X');
    }

    cells.forEach(cell => cell.addEventListener('click', handleCellClick));
    resetBtn.addEventListener('click', resetGame);
  </script>
</body>
</html>
