<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive form</title>
    </head>
<body>
    <h1>Driving License</h1>
    <form id="details">
        <label>Name:</label>
        <input type="text" id="name" required>
        <br><br>
        <label>Email:</label>
        <input type="email" id="mail" required>
        <br><br>
        <label>DOB:</label>
        <input type="date" id="dob" required>
        <br><br>
        <label>Gender:</label>
        <input type="radio" name="gender" value="Male" required> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>
        <label>Phone no:</label>
        <input type="number" id="phone" required><br><br>
        <label>Documents:</label>
        <input type="checkbox" name="documents" value="Pollution Certificate"> Pollution Certificate
        <input type="checkbox" name="documents" value="RC Book"> RC Book
        <br><br>
        <label>Age:</label>
        <input type="number" id="age" required>
        <br><br>
        <label>Address:</label>
        <input type="text" id="address" required>
        <br><br>
        <label>Photo</label>
        <input type="file" id="image" accept="image/*" required>
        <br><br>
        <button type="submit">Submit</button>
    </form>
    <h2>License Details</h2>
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <p id="p4"></p>
    <p id="p5"></p>
    <p id="p6"></p>
    <img id="dp" width="200px" >
<script src="Form.js" ></script>
</body>
</html>
